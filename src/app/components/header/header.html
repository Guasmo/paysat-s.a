<header [class.scrolled]="isScrolled()">
  <a routerLink="/" class="logo" aria-label="Inicio PAYSAT">
    <img src="letras.png" alt="PAYSAT MONEY S.A." class="logo-img" />
  </a>

  <nav class="main-nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
    <a routerLink="/nosotros" routerLinkActive="active">Nosotros</a>
    <a routerLink="/soluciones" routerLinkActive="active">Soluciones</a>
    <a routerLink="/pagocel" routerLinkActive="active">PAGOCEL</a>
    <a (click)="scrollToBenefits($event)">Instituciones Financieras</a>
    <a (click)="scrollToIntegration($event)">Integracion</a>
    <a routerLink="/seguridad" routerLinkActive="active">Seguridad y Cumplimiento</a>

    <a routerLink="/recursos" routerLinkActive="active">Recursos</a>

    <a routerLink="/abre-tu-cuenta" routerLinkActive="active">Contacto</a>
  </nav>

  <div class="header-actions">
    <button routerLink="/abre-tu-cuenta" class="cta-btn">Solicitar una reuni&oacute;n</button>
  </div>
</header>
